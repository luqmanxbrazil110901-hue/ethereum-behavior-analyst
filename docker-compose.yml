version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ethanalyst
      POSTGRES_PASSWORD: ethanalyst_secret
      POSTGRES_DB: eth_behavior
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethanalyst -d eth_behavior"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    environment:
      POSTGRES_USER: ethanalyst
      POSTGRES_PASSWORD: ethanalyst_secret
      POSTGRES_DB: eth_behavior
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ETH_RPC_HTTP: "http://100.100.0.126:8547"
      ETH_RPC_WS: "ws://100.100.0.126:8548"
      ETH_BEACON_API: "http://100.100.0.126:5052"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  seed:
    build: ./backend
    command: python seed_db.py
    environment:
      POSTGRES_USER: ethanalyst
      POSTGRES_PASSWORD: ethanalyst_secret
      POSTGRES_DB: eth_behavior
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
